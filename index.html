<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SceneNote — 단편영화 기획 노트</title>
  <meta name="description" content="SceneNote는 단편영화 기획을 한 곳에서 관리할 수 있는 노트 툴입니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 배경 장식 요소 -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <!-- 필름 스트립 장식 -->
  <div class="film-strip film-strip--left">
    <div class="film-holes">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="film-strip film-strip--right">
    <div class="film-holes">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- 메인 진입 카드 -->
  <main class="login-wrapper">
    <div class="welcome-card login-card">

      <!-- 로고 영역 -->
      <div class="login-header">
        <div class="logo-icon">🎬</div>
        <h1 class="logo-title">SceneNote</h1>
        <p class="logo-subtitle">단편영화 기획을 한 곳에</p>
      </div>

      <!-- 소개 텍스트 -->
      <p class="welcome-desc">
        씬 카드, 아이디어 노트, 회의록, 소스 라이브러리까지<br />
        단편영화 제작의 모든 과정을 한 곳에서 관리하세요.
      </p>

      <!-- 기능 뱃지 -->
      <div class="feature-badges">
        <span class="feature-badge">📋 스토리보드</span>
        <span class="feature-badge">💡 아이디어 노트</span>
        <span class="feature-badge">📝 회의록</span>
        <span class="feature-badge">🎞 소스 라이브러리</span>
      </div>

      <!-- 액션 버튼 -->
      <div class="welcome-actions">
        <a href="login.html" class="btn-login" style="text-decoration: none;">
          <span class="btn-text">로그인</span>
          <span class="btn-arrow">→</span>
        </a>

        <a href="signup.html" class="btn-secondary" style="text-decoration: none;">
          <span class="btn-text">회원가입</span>
        </a>
      </div>

      <!-- 안내 텍스트 -->
      <p class="test-hint">
        🎞 테스트 계정: <strong>test@test.com</strong> / <strong>1234</strong>
      </p>

    </div>
  </main>
</body>
</html>
