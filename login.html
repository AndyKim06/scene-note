<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — SceneNote</title>
  <meta name="description" content="SceneNote에 로그인하여 단편영화 기획을 시작하세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 배경 장식 요소 -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <!-- 필름 스트립 장식 -->
  <div class="film-strip film-strip--left">
    <div class="film-holes">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="film-strip film-strip--right">
    <div class="film-holes">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- 뒤로가기 -->
  <a id="back-btn" class="back-link" href="index.html">← 홈으로</a>

  <!-- 로그인 카드 -->
  <main class="login-wrapper">
    <div class="login-card">

      <!-- 로고 영역 -->
      <div class="login-header">
        <div class="logo-icon">🎬</div>
        <h1 class="logo-title">SceneNote</h1>
        <p class="logo-subtitle">로그인하여 기획을 이어가세요</p>
      </div>

      <!-- 구분선 -->
      <div class="divider"></div>

      <!-- 입력 폼 -->
      <form id="login-form" class="login-form" onsubmit="return false;">

        <div class="input-group">
          <label for="email" class="input-label">이메일</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input
              type="email"
              id="email"
              name="email"
              class="input-field"
              placeholder="이메일을 입력하세요"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="input-group">
          <label for="password" class="input-label">비밀번호</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              class="input-field"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn-login" onclick="handleLogin()">
          <span class="btn-text">로그인</span>
          <span class="btn-arrow">→</span>
        </button>

      </form>

      <!-- 회원가입 이동 -->
      <p class="auth-switch">
        아직 계정이 없으신가요?
        <a id="go-signup-link" href="signup.html" class="auth-link">회원가입</a>
      </p>

      <!-- 안내 텍스트 -->
      <p class="test-hint">
        🎞 테스트 계정: <strong>test@test.com</strong> / <strong>1234</strong>
      </p>

    </div>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
