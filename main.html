<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneNote - 대시보드</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 아이디어 노트 탭 전용 텍스트 에어리어 스타일 지정 */
    #memo-input-wrap {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: flex-start;
    }
    #memo-input {
      flex: 1;
      height: 80px;
    }
    /* 회의록/소스 입력폼 레이아웃 */
    .input-form-box {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: var(--radius-card);
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 600px;
    }
    .memo-card {
      background: #2a2a1a;
      border-left: 4px solid var(--accent);
      padding: 16px;
      border-radius: 8px;
    }
    .memo-date { font-size: 11px; color: var(--text-muted); }
    .memo-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    
    .meeting-card { border-left: 4px solid #4834d4; }
    .meeting-date { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .meeting-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .meeting-content { font-size: 14px; line-height: 1.5; color: var(--text-secondary); margin-bottom: 12px; }
    .meeting-header { display: flex; justify-content: space-between; align-items: flex-start; }

    .source-card { display: flex; flex-direction: column; gap: 8px; }
    .source-header { display: flex; justify-content: space-between; align-items: center; }
    .source-url { color: var(--accent); text-decoration: none; font-size: 13px; word-break: break-all; }
    .source-url:hover { text-decoration: underline; }
    .source-desc { font-size: 13px; color: var(--text-secondary); }

    .scene-card { display: flex; flex-direction: column; gap: 12px; background: #16213e; }
    .scene-img-wrap { width: 100%; height: 160px; background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .scene-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .scene-img-placeholder { color: var(--text-muted); font-size: 13px; }
    .scene-header { display: flex; justify-content: space-between; align-items: center; }
    .scene-number { font-weight: 700; color: var(--text-primary); font-size: 16px; }
    .scene-fields { display: flex; flex-direction: column; gap: 8px; }
  </style>
</head>
<body style="background-color: #1a1a2e; color: #ffffff;">

  <!-- 네비게이션바 -->
  <nav class="navbar">
    <a href="#" class="navbar-logo">SceneNote</a>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </nav>

  <!-- 탭 메뉴 -->
  <div class="tab-menu">
    <button class="tab-btn active" data-tab="storyboard" onclick="showTab('storyboard')">스토리보드</button>
    <button class="tab-btn" data-tab="memos" onclick="showTab('memos')">아이디어 노트</button>
    <button class="tab-btn" data-tab="meetings" onclick="showTab('meetings')">회의록</button>
    <button class="tab-btn" data-tab="sources" onclick="showTab('sources')">소스 라이브러리</button>
  </div>

  <main>
    <!-- 스토리보드 섹션 -->
    <section id="tab-storyboard" class="tab-content tab-section">
      <button class="btn-primary" onclick="addScene()" style="margin-bottom: 24px;">+ 씬 추가</button>
      <div id="scenes-container" class="grid-2">
        <!-- 씬 카드 렌더링 영역 -->
      </div>
    </section>

    <!-- 아이디어 노트 섹션 -->
    <section id="tab-memos" class="tab-content tab-section" style="display:none;">
      <div id="memo-input-wrap">
        <textarea id="memo-input" class="field-textarea" placeholder="자유롭게 아이디어를 적어보세요..."></textarea>
        <button class="btn-primary" onclick="addMemo()" style="height: 80px;">+ 추가</button>
      </div>
      <div id="memos-container" class="grid-2">
        <!-- 메모 카드 렌더링 영역 -->
      </div>
    </section>

    <!-- 회의록 섹션 -->
    <section id="tab-meetings" class="tab-content tab-section" style="display:none;">
      <button class="btn-primary" onclick="toggleMeetingForm()" style="margin-bottom: 24px;">+ 회의록 추가</button>
      
      <!-- 회의록 입력 폼 -->
      <div id="meeting-form" class="input-form-box" style="display:none;">
        <input type="date" id="meeting-date" class="field-input">
        <input type="text" id="meeting-title" class="field-input" placeholder="회의 제목">
        <textarea id="meeting-content" class="field-textarea" rows="4" placeholder="회의 내용"></textarea>
        <div>
          <button class="btn-primary" onclick="addMeeting()">저장</button>
        </div>
      </div>
      
      <div id="meetings-container" class="grid-2">
        <!-- 회의록 카드 렌더링 영역 -->
      </div>
    </section>

    <!-- 소스 라이브러리 섹션 -->
    <section id="tab-sources" class="tab-content tab-section" style="display:none;">
      <button class="btn-primary" onclick="toggleSourceForm()" style="margin-bottom: 24px;">+ 소스 추가</button>
      
      <!-- 소스 입력 폼 -->
      <div id="source-form" class="input-form-box" style="display:none;">
        <input type="text" id="source-url" class="field-input" placeholder="URL을 입력하세요">
        <input type="text" id="source-desc" class="field-input" placeholder="설명">
        <select id="source-type" class="field-select">
          <option value="이미지">이미지</option>
          <option value="영상">영상</option>
          <option value="음악">음악</option>
          <option value="기타">기타</option>
        </select>
        <div>
          <button class="btn-primary" onclick="addSource()">저장</button>
        </div>
      </div>
      
      <div id="sources-container" class="grid-3">
        <!-- 소스 카드 렌더링 영역 -->
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
